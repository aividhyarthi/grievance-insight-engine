<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legal Case Research Library{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            LegalResearch
        </a>
        <ul class="navbar-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/search" class="{% if request.path == '/search' %}active{% endif %}">Search Cases</a>
            <a href="/analytics" class="{% if request.path == '/analytics' %}active{% endif %}">Analytics</a>
            <a href="/judges" class="{% if request.path == '/judges' %}active{% endif %}">Judges</a>
            <a href="/toolkit" class="{% if request.path == '/toolkit' %}active{% endif %}">Toolkit</a>
            <a href="/resources" class="{% if request.path == '/resources' %}active{% endif %}">Resources</a>
            <a href="/glossary" class="{% if request.path == '/glossary' %}active{% endif %}">Glossary</a>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        Legal Case Research Library &mdash; Built for lawyers, by AI Vidhyarthi &mdash; Educational & Research Tool
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
