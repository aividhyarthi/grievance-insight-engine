<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a365d"/>
  <g transform="translate(32,32)">
    <!-- Scale of justice -->
    <line x1="0" y1="-20" x2="0" y2="12" stroke="#c59b3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="-14" x2="16" y2="-14" stroke="#c59b3c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left pan -->
    <path d="M-16,-14 L-20,-4 Q-16,0 -12,-4 Z" fill="#c59b3c" opacity="0.85"/>
    <!-- Right pan -->
    <path d="M16,-14 L12,-4 Q16,0 20,-4 Z" fill="#c59b3c" opacity="0.85"/>
    <!-- Base -->
    <rect x="-8" y="12" width="16" height="3" rx="1.5" fill="#c59b3c"/>
    <rect x="-12" y="15" width="24" height="3" rx="1.5" fill="#c59b3c"/>
  </g>
</svg>
