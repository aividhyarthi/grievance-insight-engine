[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
# port is NOT set here — Railway injects $PORT at runtime

[theme]
primaryColor = "#1976d2"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1c23"
textColor = "#fafafa"
font = "sans serif"

[browser]
gatherUsageStats = false
