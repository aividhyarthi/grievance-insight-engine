<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0057B7" />
  <title>Medicine Scanner | दवाई स्कैनर</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 1 — Language Selection
  ═══════════════════════════════════════════════════════════ -->
  <div id="screen-language" class="screen active" role="main">
    <div class="lang-page">

      <header class="app-hero">
        <div class="hero-icon" aria-hidden="true">💊</div>
        <h1 class="hero-title">Medicine Scanner</h1>
        <p class="hero-desc">
          Scan any medicine with your camera and get detailed information in your language.
        </p>
      </header>

      <section class="lang-section">
        <p class="lang-prompt">Select Your Language &nbsp;/&nbsp; अपनी भाषा चुनें</p>
        <div class="lang-grid" id="lang-grid">
          <!-- Language cards injected by languages.js + app.js -->
        </div>
      </section>

    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 2 — Camera / Scanner
  ═══════════════════════════════════════════════════════════ -->
  <div id="screen-scanner" class="screen" role="main">

    <!-- Top bar -->
    <div class="scan-topbar">
      <button class="icon-btn" id="btn-change-lang" title="Change language" aria-label="Change language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="topbar-title">Medicine Scanner</span>
      <span class="topbar-lang" id="topbar-lang" aria-label="Selected language"></span>
    </div>

    <!-- Camera viewport -->
    <div class="cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas" style="display:none;" aria-hidden="true"></canvas>

      <!-- Overlay: scan frame + hint -->
      <div class="cam-overlay" aria-hidden="true">
        <div class="scan-frame">
          <span class="sf-corner tl"></span>
          <span class="sf-corner tr"></span>
          <span class="sf-corner bl"></span>
          <span class="sf-corner br"></span>
          <div class="scan-beam"></div>
        </div>
        <p class="scan-tip" id="scan-tip">Point at medicine label and tap Scan</p>
      </div>
    </div>

    <!-- Controls bar -->
    <div class="scan-controls">
      <button class="ctrl-btn" id="btn-flip" title="Flip camera" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>

      <button class="shutter-btn" id="btn-scan" aria-label="Scan medicine">
        <span class="shutter-ring"></span>
        <span class="shutter-dot"></span>
      </button>

      <div class="ctrl-placeholder" aria-hidden="true"></div>
    </div>

  </div>


  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 3 — Loading / Analyzing
  ═══════════════════════════════════════════════════════════ -->
  <div id="screen-loading" class="screen" role="status" aria-live="polite">
    <div class="loading-box">
      <div class="loading-ring" aria-hidden="true"></div>
      <p class="loading-main" id="loading-main">Analyzing medicine…</p>
      <p class="loading-sub"  id="loading-sub">Please wait</p>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 4 — Results
  ═══════════════════════════════════════════════════════════ -->
  <div id="screen-results" class="screen" role="main">

    <!-- Results header / hero -->
    <div class="results-hero">
      <button class="icon-btn results-back" id="btn-results-back" title="Scan again" aria-label="Scan again">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="results-hero-info">
        <h2 class="results-name" id="result-name">Medicine</h2>
        <span class="results-type-badge" id="result-type"></span>
      </div>
    </div>

    <!-- Scrollable info cards -->
    <div class="results-scroll" id="results-scroll">
      <!-- Info cards injected by app.js -->
    </div>

  </div>


  <!-- ═══════════════════════════════════════════════════════════
       Toast notification (errors)
  ═══════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive">
    <span id="toast-msg"></span>
  </div>


  <script src="js/languages.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
