name: Configure Railway Environment

on:
  push:
    branches:
      - claude/youtube-metadata-extractor-H6ECc
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Set ANTHROPIC_API_KEY in Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Query Railway to find the project/service/environment IDs
          PROJECTS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { projects { edges { node { id name services { edges { node { id name } } } environments { edges { node { id name } } } } } } } }"}')

          echo "Projects fetched successfully"

          PROJECT_ID=$(echo "$PROJECTS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for edge in data['data']['me']['projects']['edges']:
    p = edge['node']
    if p['services']['edges']:
        print(p['id'])
        break
")

          SERVICE_ID=$(echo "$PROJECTS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for edge in data['data']['me']['projects']['edges']:
    for se in edge['node']['services']['edges']:
        print(se['node']['id'])
        sys.exit()
")

          ENV_ID=$(echo "$PROJECTS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for edge in data['data']['me']['projects']['edges']:
    for ee in edge['node']['environments']['edges']:
        e = ee['node']
        if e['name'].lower() == 'production':
            print(e['id'])
            sys.exit()
for edge in data['data']['me']['projects']['edges']:
    for ee in edge['node']['environments']['edges']:
        print(ee['node']['id'])
        sys.exit()
")

          echo "Project: $PROJECT_ID | Service: $SERVICE_ID | Env: $ENV_ID"

          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", name: \\\"ANTHROPIC_API_KEY\\\", value: \\\"$ANTHROPIC_API_KEY\\\" }) }\"
            }")

          echo "Result: $RESULT"
