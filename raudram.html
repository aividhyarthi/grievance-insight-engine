<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raudram — Ask. Learn. Rank.</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --gold:    #C4762A;
      --saffron: #E8A020;
      --gold-hi: #D4AF37;
    }

    [data-theme="light"] {
      --bg:               #F7F8FA;
      --sidebar-bg:       #FFFFFF;
      --text:             #1A1A1A;
      --text-muted:       #888888;
      --border:           #E8E8E8;
      --user-bubble:      #FFF3E0;
      --user-bubble-bdr:  #E8A020;
      --ai-bubble:        #FFFFFF;
      --ai-bubble-bdr:    #E8E8E8;
      --input-bg:         #FFFFFF;
      --topic-hover:      #FFF8F0;
      --topic-active:     #FFF3E0;
      --shadow:           rgba(0,0,0,0.07);
      --welcome-sub:      #666;
    }

    [data-theme="dark"] {
      --bg:               #0A0500;
      --sidebar-bg:       #110800;
      --text:             #F5E6C8;
      --text-muted:       #A08060;
      --border:           rgba(212,175,55,0.2);
      --user-bubble:      #2A1500;
      --user-bubble-bdr:  rgba(196,118,42,0.5);
      --ai-bubble:        rgba(196,118,42,0.07);
      --ai-bubble-bdr:    rgba(212,175,55,0.2);
      --input-bg:         rgba(255,255,255,0.04);
      --topic-hover:      rgba(196,118,42,0.12);
      --topic-active:     rgba(196,118,42,0.2);
      --shadow:           rgba(0,0,0,0.4);
      --welcome-sub:      #A08060;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── App Shell ── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 270px;
      min-width: 270px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 22px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .brand-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 5px;
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-tagline {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .sidebar-avatar {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .avatar-circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C4762A, #D4AF37);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 2px solid var(--gold-hi);
    }
    .avatar-name { font-weight: 700; font-size: 14px; }
    .avatar-role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .sidebar-section-label {
      padding: 14px 20px 8px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .topic-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px;
    }
    .topic-list::-webkit-scrollbar { width: 3px; }
    .topic-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .topic-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .topic-item:hover { background: var(--topic-hover); border-color: var(--border); }
    .topic-item.active { background: var(--topic-active); border-color: var(--gold); }
    .t-icon { font-size: 17px; flex-shrink: 0; }
    .t-name { font-size: 13px; font-weight: 600; }
    .t-desc { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lang-btns { display: flex; gap: 4px; }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 3px 9px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      transition: all .2s;
    }
    .lang-btn.active, .lang-btn:hover { border-color: var(--gold); color: var(--gold); }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .welcome-icon { font-size: 52px; margin-bottom: 18px; }
    .welcome-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .welcome-sub {
      font-size: 15px;
      color: var(--welcome-sub);
      margin-bottom: 32px;
    }
    .welcome-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 560px;
    }
    .welcome-card {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .welcome-card:hover {
      border-color: var(--gold);
      background: var(--topic-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 14px var(--shadow);
    }

    /* Chat view */
    .chat-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--sidebar-bg);
      flex-shrink: 0;
    }
    .chat-header-icon { font-size: 20px; }
    .chat-topic-name { font-weight: 700; font-size: 15px; }
    .chat-topic-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .change-topic-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
      white-space: nowrap;
    }
    .change-topic-btn:hover { border-color: var(--gold); color: var(--gold); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; gap: 12px; max-width: 78%; }
    .message.ai  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      border: 1.5px solid var(--gold-hi);
    }
    .msg-avatar.user-av {
      background: var(--user-bubble);
      border-color: var(--user-bubble-bdr);
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
    }
    .msg-content {
      background: var(--ai-bubble);
      border: 1px solid var(--ai-bubble-bdr);
      border-radius: 16px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.75;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .message.user .msg-content {
      background: var(--user-bubble);
      border-color: var(--user-bubble-bdr);
      border-radius: 16px;
      border-top-right-radius: 4px;
    }
    .msg-sender {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* Typing */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--ai-bubble-bdr);
      border-radius: 16px;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:.4; }
      40%          { transform: translateY(-5px); opacity:1; }
    }

    /* Input */
    .input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: var(--sidebar-bg);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,118,42,0.1);
    }
    .msg-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    .msg-input::placeholder { color: var(--text-muted); }
    .send-btn {
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
    }
    .send-btn:hover { opacity: .85; transform: scale(1.05); }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; fill: white; }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

    /* ── Rendered Markdown inside bubbles ── */
    .msg-content h1, .msg-content h2, .msg-content h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      margin: 10px 0 4px;
    }
    .msg-content h1 { font-size: 16px; }
    .msg-content p { margin: 6px 0; }
    .msg-content ul, .msg-content ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .msg-content li { margin: 3px 0; }
    .msg-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }
    .msg-content a {
      color: var(--gold);
      text-decoration: underline;
      word-break: break-word;
    }
    .msg-content a:hover { color: var(--saffron); }
    .msg-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 8px 0;
      display: block;
    }
    .msg-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
    }
    .msg-content th {
      background: var(--topic-active);
      color: var(--gold);
      font-weight: 700;
      padding: 7px 10px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .msg-content td {
      padding: 6px 10px;
      border: 1px solid var(--border);
    }
    .msg-content tr:nth-child(even) td { background: rgba(0,0,0,0.02); }
    .msg-content code {
      background: var(--topic-active);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--gold);
    }
    .msg-content pre {
      background: var(--topic-active);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-content pre code {
      background: none;
      padding: 0;
      font-size: 12px;
      color: var(--text);
    }
    .msg-content blockquote {
      border-left: 3px solid var(--gold);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
      font-style: italic;
    }
    .msg-content strong { color: var(--text); }

    /* Mobile */
    .mob-toggle {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
    }

    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        left: -270px;
        top: 0;
        height: 100%;
        z-index: 150;
        transition: left .3s;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }
      .sidebar.open { left: 0; }
      .mob-toggle { display: flex; }
      .chat-header { padding-left: 58px; }
      .chat-messages { padding: 16px; }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>

<button class="mob-toggle" id="mob-toggle">☰</button>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="brand-name">RAUDRAM</div>
      <div class="brand-tagline">Ask. Learn. Rank.</div>
    </div>

    <div class="sidebar-avatar">
      <div class="avatar-circle">🔱</div>
      <div>
        <div class="avatar-name">Raudram</div>
        <div class="avatar-role">Your Digital Shadow</div>
      </div>
    </div>

    <div class="sidebar-section-label">Choose a topic</div>
    <div class="topic-list" id="topic-list"></div>

    <div class="sidebar-footer">
      <div class="lang-btns">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('hi')">हि</button>
        <button class="lang-btn" onclick="setLang('te')">తె</button>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>

  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">

    <!-- Welcome screen -->
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">🔱</div>
      <div class="welcome-title">Hey, I'm Raudram</div>
      <div class="welcome-sub" id="welcome-sub">Pick a topic — I'll give you clear, simple answers.</div>
      <div class="welcome-cards" id="welcome-cards"></div>
    </div>

    <!-- Chat view -->
    <div class="chat-view" id="chat-view">
      <div class="chat-header">
        <span class="chat-header-icon" id="chat-topic-icon">🔍</span>
        <div>
          <div class="chat-topic-name" id="chat-topic-name">SEO</div>
          <div class="chat-topic-desc" id="chat-topic-desc">Search Engine Optimization</div>
        </div>
        <button class="change-topic-btn" onclick="showWelcome()">← Change Topic</button>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea
            class="msg-input"
            id="msg-input"
            rows="1"
            placeholder="Ask Raudram..."
          ></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>

  </main>
</div>

<script>
const PROXY_URL = '/wp-content/raudram/raudram-proxy.php';

const TOPICS = [
  { id:'SEO',      icon:'🔍', name:'SEO',          desc:'Search Engine Optimization' },
  { id:'AEO',      icon:'🤖', name:'AEO',          desc:'Answer Engine Optimization' },
  { id:'GEO',      icon:'🌐', name:'GEO',          desc:'Generative Engine Optimization' },
  { id:'TechSEO',  icon:'⚙️', name:'Tech SEO',     desc:'Technical SEO & Core Web Vitals' },
  { id:'YouTube',  icon:'▶️', name:'YouTube',       desc:'YouTube SEO & Growth' },
  { id:'Social',   icon:'📱', name:'Social Media',  desc:'Organic & Paid Social Strategy' },
  { id:'ORM',      icon:'🛡️', name:'ORM',          desc:'Online Reputation Management' },
  { id:'Strategy', icon:'♟️', name:'Strategy',      desc:'Digital Marketing Strategy' },
];

const i18n = {
  en: {
    welcomeSub:  'Pick a topic — I\'ll give you clear, simple answers.',
    greeting:    (t) => `Hey, I am Raudram, Your Digital Shadow. What brings you to me today?\nI am here to illuminate your path on **${t}**.`,
    placeholder: 'Ask Raudram...',
  },
  hi: {
    welcomeSub:  'एक विषय चुनें — मैं आपको सरल उत्तर दूंगा।',
    greeting:    (t) => `नमस्ते, मैं रौद्रम हूं, आपकी डिजिटल छाया। आज आप किसलिए आए हैं?\nमैं **${t}** के विषय में आपका मार्गदर्शन करने के लिए यहां हूं।`,
    placeholder: 'रौद्रम से पूछें...',
  },
  te: {
    welcomeSub:  'ఒక విషయం ఎంచుకోండి — నేను స్పష్టమైన సమాధానాలు ఇస్తాను।',
    greeting:    (t) => `నమస్కారం, నేను రౌద్రం, మీ డిజిటల్ నీడ. ఈరోజు మీరు ఏమి కోసం వచ్చారు?\nనేను **${t}** విషయంలో మీకు మార్గనిర్దేశం చేయడానికి ఇక్కడ ఉన్నాను.`,
    placeholder: 'రౌద్రాన్ని అడగండి...',
  },
};

let currentLang  = 'en';
let currentTopic = null;
let chatHistory  = [];
let isLoading    = false;
let isDark       = false;

/* ── Theme toggle ── */
document.getElementById('theme-toggle').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
});

/* ── Mobile sidebar ── */
document.getElementById('mob-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

/* ── Build sidebar + welcome cards ── */
function buildTopics() {
  const list  = document.getElementById('topic-list');
  const cards = document.getElementById('welcome-cards');
  list.innerHTML = '';
  cards.innerHTML = '';

  TOPICS.forEach(t => {
    const item = document.createElement('div');
    item.className = 'topic-item';
    item.dataset.id = t.id;
    item.innerHTML = `
      <span class="t-icon">${t.icon}</span>
      <div>
        <div class="t-name">${t.name}</div>
        <div class="t-desc">${t.desc}</div>
      </div>
    `;
    item.addEventListener('click', () => openTopic(t));
    list.appendChild(item);

    const card = document.createElement('button');
    card.className = 'welcome-card';
    card.innerHTML = `${t.icon} ${t.name}`;
    card.addEventListener('click', () => openTopic(t));
    cards.appendChild(card);
  });
}

/* ── Language ── */
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => {
    if ((lang === 'en' && b.textContent === 'EN') ||
        (lang === 'hi' && b.textContent.includes('हि')) ||
        (lang === 'te' && b.textContent.includes('తె'))) {
      b.classList.add('active');
    }
  });
  document.getElementById('msg-input').placeholder = i18n[lang].placeholder;
  document.getElementById('welcome-sub').textContent = i18n[lang].welcomeSub;
}

/* ── Welcome screen ── */
function showWelcome() {
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('chat-view').style.display = 'none';
  currentTopic = null;
  chatHistory  = [];
  document.querySelectorAll('.topic-item').forEach(i => i.classList.remove('active'));
}

/* ── Open topic / start chat ── */
function openTopic(topic) {
  currentTopic = topic;
  chatHistory  = [];

  document.querySelectorAll('.topic-item').forEach(i => {
    i.classList.toggle('active', i.dataset.id === topic.id);
  });

  document.getElementById('chat-topic-icon').textContent = topic.icon;
  document.getElementById('chat-topic-name').textContent = topic.name;
  document.getElementById('chat-topic-desc').textContent = topic.desc;

  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';

  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  document.getElementById('send-btn').disabled = false;

  addMessage('ai', i18n[currentLang].greeting(topic.name));
  document.getElementById('msg-input').focus();
  document.getElementById('sidebar').classList.remove('open');
}

/* ── Chat helpers ── */
function addMessage(role, text) {
  const area = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  if (role === 'ai') {
    wrap.innerHTML = `
      <div class="msg-avatar">🔱</div>
      <div class="msg-content">
        <div class="msg-sender">Raudram</div>
        ${formatText(text)}
      </div>
    `;
  } else {
    wrap.innerHTML = `
      <div class="msg-content">${escapeHtml(text)}</div>
      <div class="msg-avatar user-av">You</div>
    `;
  }

  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function formatText(text) {
  return marked.parse(text, { breaks: true, gfm: true });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  const area = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'message ai';
  wrap.id = 'typing-wrap';
  wrap.innerHTML = `
    <div class="msg-avatar">🔱</div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  `;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typing-wrap');
  if (el) el.remove();
}

/* ── Send message ── */
async function sendMessage() {
  const input   = document.getElementById('msg-input');
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', message);
  chatHistory.push({ role: 'user', content: message });
  showTyping();

  try {
    const res = await fetch(PROXY_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic:    currentTopic.id,
        language: currentLang,
        history:  chatHistory,
        message:  message,
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    hideTyping();
    const reply = data.response || 'I am unable to respond right now. Please try again.';
    addMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    hideTyping();
    addMessage('ai', `Something went wrong. Please try again.\n\n_(${err.message})_`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
}

/* ── Input events ── */
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('send-btn').addEventListener('click', sendMessage);

/* ── Init ── */
buildTopics();
setLang('en');
</script>
</body>
</html>
