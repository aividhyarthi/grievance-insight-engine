services:
  - type: web
    name: postcraft-social-media-generator
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install --no-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # auto-generated
      - key: PYTHON_VERSION
        value: "3.11.0"
