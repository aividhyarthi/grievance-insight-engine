services:
  - type: web
    name: grievance-insight-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
